server {
    listen 0.0.0.0:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types application/javascript text/css image/svg+xml text/plain application/json;
    gzip_min_length 1000;

    location = /frontend-health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location ^~ /free-tools/assets/ {
        alias /usr/share/nginx/html/assets/;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location = /aibim-logo.svg {
        try_files /aibim-logo.svg =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location = /free-tools/aibim-logo.svg {
        alias /usr/share/nginx/html/aibim-logo.svg;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location = /free-tools/favicon.svg {
        alias /usr/share/nginx/html/favicon.svg;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location /free-tools/ {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location = /llms.txt {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /robots.txt {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /sitemap.xml {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
}
